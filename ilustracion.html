<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilustracion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icono.png" type="image/png">
    <style>
        /* Agregar estilos para el carrusel */
        .carousel {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30%; /* Asegúrate de que el carrusel tenga el mismo tamaño */
            position: relative; /* Para posicionar las flechas */
        }

        .carousel img {
            width: 100%; /* Para asegurarte de que la imagen ocupe todo el espacio */
            height: auto;
            object-fit: contain;
        }

        .carousel button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.7); /* Fondo semitransparente */
            border: none;
            cursor: pointer;
            padding: 10px;
            z-index: 10;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
    </style>

    <script>
        // Función para detectar si es móvil
        function isMobile() {
            return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent);
        }

        // Redirección a la versión móvil si es necesario
        if (isMobile()) {
            window.location.href = "ilusmovil.html"; // Redireccionar a ilusmovil.html
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- Primer fila de imágenes (pie de página) con enlaces -->
        <div class="row-top">
            <a href="logos.html"><img src="http://imgfz.com/i/2CJZNY5.png" alt="Imagen 1" class="image-top"></a>
            <a href="index.html"><img src="http://imgfz.com/i/ATmi8xP.png" alt="Menú" class="image-top"></a>
            <a href="https://www.instagram.com/sotosolo_/?__pwa=1.html"><img src="http://imgfz.com/i/nKIodPk.png" alt="Otra Imagen" class="image-top"></a> <!-- Nueva imagen -->
        </div>

        <!-- Segunda fila de imágenes grandes -->
        <div class="row-full">
            <img src="http://imgfz.com/i/QoRmaZ9.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/drADzvl.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel1')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/Zmzip6Y.png" alt="Contenedor 3" class="image-full" id="imageChanger1"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel1')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>

        <!-- CARRUSEL 2 -->
        <div class="row-full">
            <img src="http://imgfz.com/i/QoRmaZ9.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/Eh9aRAJ.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel2')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/PsuqIL3.png" alt="Contenedor 3" class="image-full" id="imageChanger2"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel2')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>

        <!-- CARRUSEL 3 (PAISES) -->
        <div class="row-full">
            <img src="http://imgfz.com/i/N1DZOth.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/jehb3Tr.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel3')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/TdL1gCI.png" alt="Contenedor 3" class="image-full" id="imageChanger3"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel3')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>

        <!-- CARRUSEL 4 (LUZ) -->
        <div class="row-full">
            <img src="http://imgfz.com/i/N1DZOth.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/Ooy4ujI.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel4')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/xVSvgmH.png" alt="Contenedor 3" class="image-full" id="imageChanger4"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel4')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>

        <!-- CARRUSEL 5 (NUEVO APA) -->
        <div class="row-full">
            <img src="http://imgfz.com/i/we1bYMl.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/fRvBZ60.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel5')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/IF3kNKg.png" alt="Contenedor 3" class="image-full" id="imageChanger5"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel5')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>
    </div>

    <script>
        // Lista de imágenes para el primer carrusel
        const images1 = [
            'http://imgfz.com/i/Zmzip6Y.png',
            'http://imgfz.com/i/9wL0Zh3.png',
            'http://imgfz.com/i/LwQeZOF.png',
            'http://imgfz.com/i/fkmC6QA.png',
            'http://imgfz.com/i/6erpTzV.png',
            'http://imgfz.com/i/SgACR7x.png',
            'http://imgfz.com/i/Lx9yjbd.png',
            'http://imgfz.com/i/ZKkt7jl.png',
            'http://imgfz.com/i/vq2J853.png'
        ];

        // Lista de imágenes para el segundo carrusel
        const images2 = [
            'http://imgfz.com/i/PsuqIL3.png',
            'http://imgfz.com/i/8YFaj9u.png',
            'http://imgfz.com/i/z7sCigJ.png'
        ];

        // Lista de imágenes para el tercer carrusel
        const images3 = [
            'http://imgfz.com/i/TdL1gCI.png',
            'http://imgfz.com/i/QSCpczm.png',
            'http://imgfz.com/i/KxlaMq2.png',
            'http://imgfz.com/i/GNq8yXk.png',
            'http://imgfz.com/i/fY75Vt0.png'
        ];

        // Lista de imágenes para el cuarto carrusel (LUZ)
        const images4 = [
            'http://imgfz.com/i/xVSvgmH.png',
            'http://imgfz.com/i/UNAGu5i.png',
            'http://imgfz.com/i/wh2E8KP.png',
            'http://imgfz.com/i/ykMXx91.png',
            'http://imgfz.com/i/RXVGbcI.png',
            'http://imgfz.com/i/Oq1LZIm.png',
            'http://imgfz.com/i/9DmYMrn.png',
            'http://imgfz.com/i/39JFYPk.png'
        ];

        // Lista de imágenes para el quinto carrusel (APA)
        const images5 = [
            'http://imgfz.com/i/IF3kNKg.png',
            'http://imgfz.com/i/i2Nwaon.png',
            'http://imgfz.com/i/9ZP0rdE.png',
            'http://imgfz.com/i/YvACTF2.png',
            'http://imgfz.com/i/J58VOvg.png',
            'http://imgfz.com/i/rwbDVli.png',
            'http://imgfz.com/i/bci0kqI.png',
            'http://imgfz.com/i/ODUWXvA.png'
        ];

        // Índices actuales de los carruseles
        let currentIndex1 = 0;
        let currentIndex2 = 0;
        let currentIndex3 = 0;
        let currentIndex4 = 0;
        let currentIndex5 = 0; // Índice para el quinto carrusel (nuevo)

        // Función para cambiar la imagen
        function changeImage(direction, carousel) {
            if (carousel === 'carousel1') {
                currentIndex1 = (currentIndex1 + direction + images1.length) % images1.length; // Actualiza el índice
                document.getElementById('imageChanger1').src = images1[currentIndex1]; // Cambia la fuente de la imagen
            } else if (carousel === 'carousel2') {
                currentIndex2 = (currentIndex2 + direction + images2.length) % images2.length; // Actualiza el índice
                document.getElementById('imageChanger2').src = images2[currentIndex2]; // Cambia la fuente de la imagen
            } else if (carousel === 'carousel3') {
                currentIndex3 = (currentIndex3 + direction + images3.length) % images3.length; // Actualiza el índice
                document.getElementById('imageChanger3').src = images3[currentIndex3]; // Cambia la fuente de la imagen
            } else if (carousel === 'carousel4') {
                currentIndex4 = (currentIndex4 + direction + images4.length) % images4.length; // Actualiza el índice
                document.getElementById('imageChanger4').src = images4[currentIndex4]; // Cambia la fuente de la imagen
            } else if (carousel === 'carousel5') {
                currentIndex5 = (currentIndex5 + direction + images5.length) % images5.length; // Actualiza el índice
                document.getElementById('imageChanger5').src = images5[currentIndex5]; // Cambia la fuente de la imagen
            }
        }

        // Bloquear clic derecho en todas las imágenes
        document.addEventListener('contextmenu', function (event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault(); // Evita que se abra el menú contextual
            }
        });
    </script>
</body>
</html>
