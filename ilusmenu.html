<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Imágenes con URLs Externas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos generales para centrar las imágenes */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        /* Contenedor para la imagen única debajo */
        .single-image {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        /* Estilos específicos para cada imagen */
        .img1, .img2, .img3, .img4, .img5 {
            width: 260px;
            height: 370px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* Efecto de zoom al pasar el mouse */
        .img1:hover, .img2:hover, .img3:hover, .img4:hover, .img5:hover {
            transform: scale(1);
        }

        /* Estilo para la imagen única */
        .single-image img {
            width: 50px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Primer fila de imágenes (pie de página) con enlaces -->
        <div class="row-top">
            <a href="logos.html"><img src="http://imgfz.com/i/76qgewM.png" alt="Imagen 1" class="image-top"></a>
            <a href="index.html"><img src="http://imgfz.com/i/D95CI02.png" alt="Menú" class="image-top"></a>
            <a href="https://www.instagram.com/sotosolo_/?__pwa=1.html"target="_blank"><img src="http://imgfz.com/i/xrVCTs5.png" alt="Otra Imagen" class="image-top"></a>
        </div>
    <div class="gallery">
        <!-- Imagen 1 con enlace a una página HTML -->
        <a href="hayflores.html">
            <img src="http://imgfz.com/i/Zmzip6Y.png" class="img1" alt="Ilustración 1" 
                 onmouseover="changeImage(this, 'http://imgfz.com/i/MiInbsk.png')" 
                 onmouseout="changeImage(this, 'http://imgfz.com/i/Zmzip6Y.png')">
        </a>

        <!-- Imagen 2 con enlace a una página HTML -->
        <a href="inmenso.html">
            <img src="http://imgfz.com/i/PsuqIL3.png" class="img2" alt="Ilustración 2" 
                 onmouseover="changeImage(this, 'http://imgfz.com/i/zZHUT3f.png')" 
                 onmouseout="changeImage(this, 'http://imgfz.com/i/PsuqIL3.png')">
        </a>

        <!-- Imagen 3 con enlace a una página HTML -->
        <a href="descripcion.html">
            <img src="http://imgfz.com/i/TdL1gCI.png" class="img3" alt="Ilustración 3" 
                 onmouseover="changeImage(this, 'http://imgfz.com/i/CMEQlaw.png')" 
                 onmouseout="changeImage(this, 'http://imgfz.com/i/TdL1gCI.png')">
        </a>

        <!-- Imagen 4 con enlace a una página HTML -->
        <a href="algunas.html">
            <img src="http://imgfz.com/i/xVSvgmH.png" class="img4" alt="Ilustración 4" 
                 onmouseover="changeImage(this, 'http://imgfz.com/i/4ylAnZI.png')" 
                 onmouseout="changeImage(this, 'http://imgfz.com/i/xVSvgmH.png')">
        </a>

        <!-- Imagen 5 con enlace a una página HTML -->
        <a href="apariencias.html">
            <img src="http://imgfz.com/i/IF3kNKg.png" class="img5" alt="Ilustración 5" 
                 onmouseover="changeImage(this, 'http://imgfz.com/i/zqkKM5s.png')" 
                 onmouseout="changeImage(this, 'http://imgfz.com/i/IF3kNKg.png')">
        </a>
    </div>

    <!-- Nueva imagen única centrada debajo -->
    <div class="single-image">
        <img src="http://imgfz.com/i/zJY9MxK.png" alt="Imagen única">
    </div>

    <script>
        // Función para cambiar la imagen al pasar el mouse
        function changeImage(element, newSrc) {
            element.src = newSrc;
        }
    </script>

</body>
</html>
