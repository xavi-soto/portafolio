<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icono.png" type="image/png">
    <style>
        /* Agregar estilos para el carrusel */
        .carousel {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30%; /* Asegúrate de que el carrusel tenga el mismo tamaño */
            position: relative; /* Para posicionar las flechas */
        }

        .carousel img {
            width: 100%; /* Para asegurarte de que la imagen ocupe todo el espacio */
            height: auto;
            object-fit: contain;
        }

        .carousel button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(255, 255, 255, 0.7); /* Fondo semitransparente */
            border: none;
            cursor: pointer;
            padding: 10px;
            z-index: 10;
        }

        .prev {
            left: 0;
        }

        .next {
            right: 0;
        }
    </style>

    <script>
        // Función para detectar si es móvil
        function isMobile() {
            return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|Mobile/i.test(navigator.userAgent);
        }

        // Redirección a la versión móvil si es necesario
        if (isMobile()) {
            window.location.href = "3dmovil.html"; // Redireccionar a 3dmovil.html
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- Primer fila de imágenes (pie de página) con enlaces -->
        <div class="row-top">
            <a href="desoido.html"><img src="http://imgfz.com/i/2CJZNY5.png" alt="Imagen 1" class="image-top"></a>
            <a href="index.html"><img src="http://imgfz.com/i/ATmi8xP.png" alt="Menú" class="image-top"></a>
            <a href="https://www.instagram.com/sotosolo_/?__pwa=1.html"><img src="http://imgfz.com/i/nKIodPk.png" alt="Otra Imagen" class="image-top"></a> <!-- Nueva imagen -->
        </div>

        <!-- Primera fila de imágenes grandes -->
        <div class="row-full">
            <img src="http://imgfz.com/i/BnYUbjc.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/GmwYCc6.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel1')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="http://imgfz.com/i/aQ921Lb.png" alt="Contenedor 3" class="image-full" id="imageChanger1"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel1')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>

        <!-- CARRUSEL 2 -->
        <div class="row-full">
            <img src="http://imgfz.com/i/EIYsRt0.png" alt="Contenedor 1" class="image-full">
            <img src="http://imgfz.com/i/86JjyzF.png" alt="Contenedor 2" class="image-full">
            <div class="carousel">
                <button class="prev" onclick="changeImage(-1, 'carousel2')">&#10094;</button> <!-- Flecha izquierda -->
                <img src="assets/chu10.png" alt="Contenedor 3" class="image-full" id="imageChanger2"> <!-- Imagen que cambia -->
                <button class="next" onclick="changeImage(1, 'carousel2')">&#10095;</button> <!-- Flecha derecha -->
            </div>
        </div>
    </div>

    <script>
        // Lista de imágenes para el primer carrusel
        const images1 = [
            'http://imgfz.com/i/aQ921Lb.png',
            'http://imgfz.com/i/zoW3fDd.png',
            'http://imgfz.com/i/D8qKwkg.png',
            'http://imgfz.com/i/IYdmXHg.png',
            'http://imgfz.com/i/bNUS4tK.png',
            'http://imgfz.com/i/h6kiQKr.png',
            'http://imgfz.com/i/YfxdAKI.png',
            'http://imgfz.com/i/dICNWo9.png',
            'http://imgfz.com/i/k8z2ixR.png'
        ];

        // Lista de imágenes para el segundo carrusel
        const images2 = [
            'http://imgfz.com/i/dkwDp7e.png',
            'http://imgfz.com/i/IFcsS89.png',
            'http://imgfz.com/i/QPGj08m.png',
            'http://imgfz.com/i/Uhikefc.png',
            'http://imgfz.com/i/IuJT0pZ.png'
        ];

        // Índices actuales de los carruseles
        let currentIndex1 = 0;
        let currentIndex2 = 0;

        // Función para cambiar la imagen
        function changeImage(direction, carousel) {
            if (carousel === 'carousel1') {
                currentIndex1 = (currentIndex1 + direction + images1.length) % images1.length; // Actualiza el índice
                document.getElementById('imageChanger1').src = images1[currentIndex1]; // Cambia la fuente de la imagen
            } else if (carousel === 'carousel2') {
                currentIndex2 = (currentIndex2 + direction + images2.length) % images2.length; // Actualiza el índice
                document.getElementById('imageChanger2').src = images2[currentIndex2]; // Cambia la fuente de la imagen
            }
        }

        // Bloquear clic derecho en todas las imágenes
        document.addEventListener('contextmenu', function (event) {
            if (event.target.tagName === 'IMG') {
                event.preventDefault(); // Evita que se abra el menú contextual en las imágenes
            }
        });
    </script>
</body>
</html>
